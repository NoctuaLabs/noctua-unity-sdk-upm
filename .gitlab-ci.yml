variables:
  NATIVE_IOS_VERSION: "0.30.0"
  NATIVE_IOS_ICM_VERSION: "0.30.0"
stages:
  - trigger
  - bump-version-for-release # Bump version as tag
  - publish # Publish to github

trigger_job:
  stage: trigger
  trigger:
    project: $BUILDER_PROJECT
  rules:
    - when: never

.bump-version:
  image :
    name: alpine/git
    entrypoint: [""]
  before_script:
    # git-cliff drives the semantic version bump + changelog generation. The runner must provide
    # it: `apk add git-cliff` works on alpine edge/testing; otherwise install the static binary or
    # `cargo install git-cliff`. jq is used to patch package.json.
    - apk add --no-cache git-cliff jq curl || true
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"

bump-version-for-release:
  extends: .bump-version
  stage: bump-version-for-release
  tags:
    - local2
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_BRANCH == "ci"
  variables:
    GIT_STRATEGY: fetch # reuse workspace
    GIT_DEPTH: 0 # avoid shallow clone to give cliff all the info it needs
  artifacts:
    reports:
      dotenv: build.env
  script:
    # Compute the next version semantically from conventional-commit types.
    #   feat!/BREAKING -> MAJOR | feat -> MINOR | everything else (fix/improve/perf/...) -> PATCH
    #
    # NOTE: we do NOT use `git-cliff --bumped-version` for the version number. This repo's release
    # tags are created by the `publish` job on a divergent, test-stripped commit, so tags are not
    # ancestors of `main` — git-cliff would bump from the last *reachable* tag and regress the
    # version (e.g. 0.122.0 -> 0.123.0 while package.json is already 0.126.0). Instead we anchor to
    # package.json (authoritative on main) and only derive the bump LEVEL from the commits.
    - |
      CURRENT=$(jq -r .version package.json)
      BASE_TAG=$(git describe --tags --abbrev=0 --match '[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "")
      RANGE=${BASE_TAG:+$BASE_TAG..HEAD}
      SUBJECTS=$(git log --format='%s' $RANGE)   # subject line — for type!: and feat: detection
      BODIES=$(git log --format='%B' $RANGE)     # full message — for BREAKING CHANGE footer
      if echo "$SUBJECTS" | grep -qE '^[a-z]+(\([^)]*\))?!:' || echo "$BODIES" | grep -q 'BREAKING CHANGE'; then
        LEVEL=major
      elif echo "$SUBJECTS" | grep -qE '^feat(\([^)]*\))?:'; then
        LEVEL=minor
      else
        LEVEL=patch
      fi
      NEW_VERSION_TAG=$(echo "$CURRENT" | awk -F. -v L=$LEVEL '{if(L=="major")print ($1+1)".0.0"; else if(L=="minor")print $1"."($2+1)".0"; else print $1"."$2"."($3+1)}')
      echo "Version bump: $CURRENT -> $NEW_VERSION_TAG (level=$LEVEL, range=${RANGE:-<all>})"
    - jq --arg version "$NEW_VERSION_TAG" '.version = $version' package.json > temp.json && mv temp.json package.json
    - |
      cat <<EOF > Runtime/AssemblyInfo.cs
      using System.Reflection;

      [assembly: AssemblyVersion("$NEW_VERSION_TAG")]
      EOF
    # Regenerate the changelog, labelling the new section with the computed version.
    - git-cliff --tag "$NEW_VERSION_TAG" --bump > CHANGELOG.md
    # Literal block so the colon in "chore(release):" doesn't break YAML parsing.
    - |
      if [ -n "$(git diff --name-only HEAD -- ./package.json)" ]; then
        echo "Bumping version for next release"
        git add package.json Runtime/AssemblyInfo.cs CHANGELOG.md
        git commit -m "chore(release): bump version to $NEW_VERSION_TAG [skip ci]"
        git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-sdk-unity-upm.git" HEAD:$CI_COMMIT_BRANCH --follow-tags -o ci.skip
      else
        echo "No version bump required"
      fi
    - echo "NEW_VERSION_TAG=$NEW_VERSION_TAG" > build.env
    - echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> build.env

# Publish to github
publish:
  stage: publish
  tags:
    - local-shell
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_COMMIT_BRANCH == "ci"
  variables:
    GIT_STRATEGY: fetch # reuse workspace
    GIT_DEPTH: 0 # avoid shallow clone to give cliff all the info it needs
  needs: [bump-version-for-release]
  before_script:
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"
  script:
    # Prepare GitHub CLI tool
    #- curl -sS https://webi.sh/gh | sh # Already installed in local-shell runner
    #- source ~/.config/envman/PATH.env
    - gh auth status >/dev/null 2>&1 || echo "$GITHUB_ACCESS_TOKEN" | gh auth login --with-token
    # Refresh
    - git fetch origin
    - git checkout $COMMIT_HASH
    - git branch -D main || true
    # Update main branch on github repo
    - git checkout -b main
    - git remote add github https://github.com/NoctuaLabs/noctua-unity-sdk-upm.git || true
    - gh auth setup-git
    # Strip test files before publishing to public GitHub
    - git rm -r --ignore-unmatch Tests Tests.meta
    - 'git commit -m "chore: exclude test files from public release [skip ci]"'
    - git push github main || true
    # Push tag to gitlab repo
    - git tag $NEW_VERSION_TAG || true
    - git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-sdk-unity-upm.git" "$NEW_VERSION_TAG" -o ci.skip || true
    # Push tag to github repo
    - git push github $NEW_VERSION_TAG || true
    # Release
    - ./generate-release-note.sh
    - gh release create $NEW_VERSION_TAG --title $NEW_VERSION_TAG --notes-file GithubRelease.md --latest
    - git remote remove github || true
